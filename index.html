<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>currency converter</title>         
    <link rel="stylesheet" href="stylesheet.css"> 
      <!-- adding Google Fonts makes the text and divs look better -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">   
</head>
<body>

    <div class="container">
        
        <div class="header">
               <h1>Currency Converter</h1>
        </div>
        

        <div class="amount">

                <form id="topunchanged" action="">
                    
                        <label for="amount">Amount  :</label>
                        <input type="number" id="amount" placeholder="Enter Amount" value="1" readonly>
                    
                </form>
        </div>
         
        <form id="conversionForm" action="#myserver" method="POST">
            

                    <div class="from">

                        <div id="from1st">

                            <label for="from">From</label>
                            <input type="text" id="from"  value="$ USD" readonly>
                            
                        </div>

                        <div id="empty1st">
                              <button type="submit" id="convert-btn">!!!</button>
                        </div>

                    </div>

                    <div class="to">
                        <div id="to1st">
                            <label for="to">To</label>
                            <select name="to" id="to"> 
                                <option value="EUR">€ EUR</option>
                                <option value="GBP">£ GBP</option>
                                <option value="NGN">₦ NGN</option>
                                <option value="INR">₹ INR</option>
                                <option value="AUD">$ AUD</option>
                                <option value="CAD">$ CAD</option>
                                <option value="SGD">$ SGD</option>
                                <option value="CHF">₣ CHF</option>
                                <option value="MYR">RM MYR</option>
                                <option value="JPY">¥ JPY</option>
                                <option value="CNEE">¥ CNEE</option>
                            </select>
                        </div>

                        <div id="inside1st"  
                                 <button type="button" id="convert-btn1">Convert</button>
                                 <!-- covered ">"  for div inside1stmakes the convert button diferent, fix when all done -->
                        </div>

                    </div>

                    <div class="secondTo">
                    
                        <div id="anotherTo">
                            <label for="secondTo">More</label>
                            <select name="secondTo" id="secondTo">
                                <option value="GBP">£ GBP</option>
                                <option value="EUR">€ EUR</option>
                                <option value="NGN">₦ NGN</option>
                                <option value="INR">₹ INR</option>
                                <option value="AUD">$ AUD</option>
                                <option value="CAD">$ CAD</option>
                                <option value="SGD">$ SGD</option>
                                <option value="CHF">₣ CHF</option>
                                <option value="MYR">RM MYR</option>
                                <option value="JPY">¥ JPY</option>
                                <option value="CNEE">¥ CNEE</option>
                            </select>
                        </div>

                        <div id="insecondTo"
                                 <button type="button" id="convert-btn2">Convert</button>
                                 <!-- see covered ">" statement above -->
                        </div>

                    </div>

        </form>

        <div class="result">
            <h3>Converted Amount:</h3>
            <p id="converted-amount"> check!! </p>
        </div>
         
        <div class="quickconvert">

                <div class="resultHere">
                    <h3>Converted Amount:</h3>
                    <p id="converted-amount"></p>
                </div>


                <div class="datesAndResult">

                    <div class="dateInfo">
                        <p></p>
                    </div> 

                    <div class="resultMiddle">
                        <p id="converted-amount">1st</p>
                    </div>

                    <div class="resultRight">
                        <p id="converted-amount2">2nd</p>
                    </div>

                </div>
                        
                <div class="toDayInfo">
                    <h3>Today</h3> 
                    <p class="today"></p>
                </div>

                 <div class="yesterdayInfo">
                    <h3>Yesterday</h3>
                    <p class="yesterday"></p>
                </div>

                <div class="rateForAllDays">

                    <div class="currencySection">
                        <h3>Currency</h3>
                        <p class="currency">USD</p>
                    </div> 

                    <div class="rateSection">
                        <h3>Rate</h3>
                        <p class="rate"></p>
                    </div>

                    <div class="dateSection">
                        <h3>Date</h3>
                        <p class="dateAll"></p>
                    </div>
                    
                    <div class="twentyFourHoursChange">
                            <h3>24hr Change</h3>
                           
                    </div>

                </div>

                <div class="previousDaysInfo">
                    <h3>Previous days</h3>
                    <p class="previous-days"></p>
                </div>
                
                <div class="previousMonth">
                    <h3>Previous Month</h3>
                    <p class="previousMonth"></p>
                </div>

                <div class="previousMonthsInfo">
                    <h3>Previous months</h3>
                    <p class="previous-months"></p>
                </div>

                <div class="monthsWithDaysInfo">
                    <h3>Month and Year</h3>
                    <div class="months-days">
                            <h4></h4>
                    </div>
                </div>
                 

                <div class="months-days-display"></div> 

                <div class="weeklyDaysInfo">
                    <h4>Weekly days</h4>

                    <div class="weeklyDaysinMonth"> 

                        <h4></h4>

                    </div>

                </div>


                </div>
                    
                
         </div>
       

    </div>
    
    <script src="allscript.js">

        
        
    </script>
    
</body>
</html>
