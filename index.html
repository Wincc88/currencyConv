            yesterday.setDate(today.getDate() - 1);
              //console.log(yesterday);
            
            const formatDate = d => d.toISOString().split('T')[0];
            
            twoDays.textContent = `Today: ${formatDate(today)}, Yesterday: ${formatDate(yesterday)}`;

            const previousDaysElement = document.querySelector('.previous-days');
            const weekDayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const previousDaysWithDates = [];

            for (let i = 0; i < yesterday.getDay(); i++) {
                const previousDate = new Date(yesterday);
                previousDate.setDate(yesterday.getDate() - (yesterday.getDay() - i));
                previousDaysWithDates.push(`${weekDayNames[previousDate.getDay()]} ${formatDate(previousDate)}`);
            }

            if (previousDaysWithDates.length) {
                previousDaysElement.textContent = previousDaysWithDates.join(', ');
            } else {
                previousDaysElement.textContent = 'No previous days before yesterday';
